  <title id="title">Free to start — no credit card</title>
  <desc id="desc">Novada offer: $10 in free credits, up to 1,000 API calls per month. Get your free key.</desc>
  <defs>
    <linearGradient id="brand-mark-top" x1="13.012" y1="0.979" x2="13.012" y2="22.074" gradientUnits="userSpaceOnUse">
      <stop stop-color="#693FD9"/>
      <stop offset="1" stop-color="#38208C"/>
