<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Novada MCP OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }

  body {
    background:
      radial-gradient(900px 500px at 95% 110%, rgba(16,212,156,0.14), transparent 55%),
      radial-gradient(1000px 600px at -5% -10%, rgba(91,46,235,0.40), transparent 55%),
      radial-gradient(600px 400px at 50% 100%, rgba(91,46,235,0.10), transparent 60%),
      linear-gradient(180deg, #0c0a17 0%, #161226 100%);
    position: relative;
  }

  /* Subtle grid mesh overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,46,235,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,46,235,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Violet glow blob — center-left */
  body::after {
    content: '';
    position: absolute;
    left: -80px;
    top: 50%;
    transform: translateY(-50%);
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(91,46,235,0.18), transparent 70%);
    pointer-events: none;
    filter: blur(40px);
  }

  .canvas {
    position: relative;
    z-index: 1;
    width: 1200px;
    height: 630px;
    padding: 54px 72px 52px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  .wordmark {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .wordmark-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: #fbfaff;
  }

  .wordmark-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #10d49c;
    background: rgba(16,212,156,0.12);
    border: 1px solid rgba(16,212,156,0.30);
    border-radius: 5px;
    padding: 2px 7px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 8px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: rgba(16,212,156,0.80);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 72px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: #fbfaff;
    margin-bottom: 0;
  }

  .headline .mint {
    color: #10d49c;
  }

  .subline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 72px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: rgba(251,250,255,0.45);
    margin-bottom: 28px;
  }

  .descriptor {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: rgba(251,250,255,0.38);
    letter-spacing: 0.02em;
    margin-top: 4px;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .endpoint-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(22, 18, 38, 0.85);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 12px 20px;
    backdrop-filter: blur(8px);
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10d49c;
    box-shadow: 0 0 0 3px rgba(16,212,156,0.25);
    flex-shrink: 0;
  }

  .endpoint-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    color: #e9e4ff;
    letter-spacing: 0.01em;
  }

  .endpoint-text .ep-scheme {
    color: rgba(233,228,255,0.40);
  }

  .endpoint-text .ep-host {
    color: #fbfaff;
    font-weight: 500;
  }

  .endpoint-text .ep-path {
    color: rgba(16,212,156,0.85);
  }

  .badge-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    font-weight: 400;
    color: rgba(251,250,255,0.45);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 5px 10px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="canvas">

    <!-- TOP BAR: wordmark top-right -->
    <div class="top-bar">
      <div class="wordmark">
        <span class="wordmark-name">novada</span>
        <span class="wordmark-tag">MCP</span>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <div class="eyebrow">Hosted MCP Server</div>
      <div class="headline">One URL. <span class="mint">25 web-data tools.</span></div>
      <div class="subline">Zero install.</div>
      <div class="descriptor">search &nbsp;·&nbsp; scrape &nbsp;·&nbsp; extract &nbsp;·&nbsp; crawl &nbsp;·&nbsp; map &nbsp;·&nbsp; verify &nbsp;·&nbsp; research &nbsp;·&nbsp; 6 proxy types</div>
    </div>

    <!-- BOTTOM BAR: endpoint left, tool badges right -->
    <div class="bottom-bar">
      <div class="endpoint-pill">
        <div class="pulse-dot"></div>
        <span class="endpoint-text">
          <span class="ep-scheme">https://</span><span class="ep-host">mcp.novada.com</span><span class="ep-path">/mcp</span>
        </span>
      </div>

      <div class="badge-row">
        <span class="badge">Claude Desktop</span>
        <span class="badge">Cursor</span>
        <span class="badge">Cline</span>
        <span class="badge">Codex</span>
      </div>
    </div>

  </div>
</body>
</html>
