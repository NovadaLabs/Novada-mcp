name: CI

on:
  push:
    branches: [main]
    paths:
      - "npm-package/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "npm-package/**"
      - ".github/workflows/**"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: npm-package

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: npm-package/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # test:coverage runs the exact same suite as `npm test` (vitest run) plus
      # v8 coverage collection + the `thresholds` gate configured in
      # vitest.config.ts. A coverage regression below the documented baseline
      # (see that file's coverage.thresholds comment) now fails the build the
      # same way a failing test does — vitest run --coverage exits non-zero on
      # a threshold miss, verified locally before wiring this in.
      - name: Test (with coverage thresholds)
        run: npm run test:coverage

      - name: Lint
        run: npm run lint
